function enrichResult(raw) {
  const r = {...raw}; const confirms = [];
  const ml = (raw.materiaaltype||"").toLowerCase();
  let mat = null;
  for (const [k,v] of Object.entries(MAT_MAP)) { if (ml.includes(k)){mat=v;break;} }
  if (mat) {
    r.ags_cat = mat.cat; r.dikte = mat.dikte; r.mat_type = mat.type;
    // Only ask for dikte confirmation if it's null AND type has options
    if (!mat.dikte && DIKTES[mat.type]) {
      confirms.push({type:"dikte", opts:(DIKTES[mat.type]).map(o=>({l:o,v:o}))});
    }
  } else {
    r.ags_cat = "Onbekend — selecteer handmatig"; r.dikte = null;
    confirms.push({type:"dikte", opts:DIKTES.lood.map(o=>({l:o,v:o}))});
  }
  // Map ags_product from AI response if present
  if (raw.ags_product) r.ags_product = raw.ags_product;
  const txt = [raw.beschrijving||"",raw.opmerkingen||"",...(raw.bewerkingen||[])].join(" ");
  const zRe = /\b(\d{2,4})-(\d{1,3})-(\d{1,3})\b/g; const zetmaten=[]; let m;
  while((m=zRe.exec(txt))!==null) zetmaten.push({raw:m[0], leg:`B ${m[1]}mm — Z1: ${m[2]}mm — Z2: ${m[3]}mm`});
  r.zetmaten = zetmaten;
  const vtags = [];
  for(const[k,v]of Object.entries(VAKTERMEN)) if(txt.toLowerCase().includes(k)&&!vtags.find(x=>x.label===v.label)) vtags.push(v);
  r.vtags = vtags;
  if (r.lengte_mm && r.lengte_mm > 3000) {
    r.delen = Math.ceil(r.lengte_mm/3000); r.deel_mm = Math.round(r.lengte_mm/r.delen);
    confirms.push({type:"confirm", id:"delen", field:"leveringInDelen",
      msg:`Lengte ${r.lengte_mm}mm overschrijdt max 3000mm. Levering in ${r.delen} delen á ${r.deel_mm}mm met koppelstuk?`});
  }
  if (vtags.some(v=>v.sev==="warn"))
    confirms.push({type:"confirm", id:"nabewerking", field:"nabewerkingOk",
      msg:`Handmatige nabewerking vereist: ${vtags.filter(v=>v.sev==="warn").map(v=>v.label).join(", ")}. Akkoord?`});
  r._confirms = confirms;
  return r;
}


function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Kon bestand niet lezen"));
    reader.onload  = e  => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function resizeDataUrl(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onerror = () => resolve(dataUrl); // fallback: original
    img.onload  = () => {
      try {
        const MAX = 1200;
        let w = img.naturalWidth  || img.width  || 0;
        let h = img.naturalHeight || img.height || 0;
        if (!w || !h) { resolve(dataUrl); return; }
        if (w > MAX || h > MAX) {
          const ratio = Math.min(MAX / w, MAX / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.88));
      } catch(e) {
        resolve(dataUrl); // canvas blocked — use original
      }
    };
    img.src = dataUrl;
  });
}

function getMediaType(dataUrl) {
  const m = dataUrl&&dataUrl.match(/^data:([a-zA-Z0-9+/.-]+);base64,/);
  const t = m?m[1].toLowerCase():"image/jpeg";
  return ["image/jpeg","image/png","image/gif","image/webp"].includes(t)?t:"image/jpeg";
}

async function checkQuality(dataUrl) {
  return new Promise(resolve => {
    try {
      const img = new Image();
      img.onload = () => {
        try {
          const c = document.createElement("canvas");
          const sc = Math.min(150/img.width, 150/img.height, 1);
          c.width = Math.round(img.width*sc); c.height = Math.round(img.height*sc);
          const ctx = c.getContext("2d"); ctx.drawImage(img,0,0,c.width,c.height);
          const d = ctx.getImageData(0,0,c.width,c.height).data;
          let bright=0, dark=0, tot=d.length/4;
          for(let i=0;i<d.length;i+=4){const l=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];if(l>220)bright++;if(l<30)dark++;}
          const issues=[];
          if(bright/tot>0.6) issues.push("Foto lijkt overbelicht");
          if(dark/tot>0.5)   issues.push("Foto is te donker");
          if(img.width<300||img.height<300) issues.push("Foto is erg klein — maak een scherpere foto");
          resolve(issues);
        } catch(e) { resolve([]); } // canvas blocked — skip silently
      };
      img.onerror = () => resolve([]);
      img.src = dataUrl;
    } catch(e) { resolve([]); }
  });
}

function AGSTool() {
  const [step, setStep]       = useState(0);   // 0=upload, 1=validate, 2=orders
  const [tab, setTab]         = useState("foto");
  const [file, setFile]       = useState(null);
  const [preview, setPrev]    = useState(null);
  const [b64, setB64]         = useState(null);
  const [mt, setMt]           = useState("image/jpeg");
  const [drag, setDrag]       = useState(false);
  const [loading, setLoading] = useState(false);
  const [qualIss, setQualIss] = useState([]);
  const [apiErr, setApiErr]   = useState(null);
  const [result, setResult]   = useState(null);
  const [answers, setAnswers] = useState({});
  const [note, setNote]       = useState("");
  const [orders, setOrders]   = useState([]);
  const [project, setProject] = useState("");
  const [algNote, setAlgNote] = useState("");
  const [toast, setToast]     = useState(null);
  const fileRef   = useRef();
  const cameraRef = useRef();

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),3500); };

  const b64Ref = useRef(null); // stable ref — always current for analyse()

  const readFile = async f => {
    if(!f) return;
    setFile(f); setResult(null); setAnswers({}); setApiErr(null); setQualIss([]); setNote("");
    b64Ref.current = null;

    try {
      // Step 1: read raw bytes
      const raw = await readFileAsDataUrl(f);
      // Step 2: show preview immediately
      setPrev(raw);
      // Step 3: resize/convert (may fall back to raw if canvas blocked)
      const final = await resizeDataUrl(raw);
      // Step 4: store b64 in BOTH ref (for immediate use) and state
      const b64data = final.split(",")[1];
      b64Ref.current = { b64: b64data, mt: "image/jpeg" };
      setB64(b64data);
      setMt("image/jpeg");
      // Step 5: quality check
      const iss = await checkQuality(final);
      setQualIss(iss);
    } catch(e) {
      setApiErr("Kon de foto niet laden: " + (e.message||"onbekende fout"));
    }
  };

  const handleDrop = useCallback(e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)readFile(f);},[]);

  const analyse = async () => {
    // Use ref as primary source — guaranteed current even if React state not flushed yet
    const src = b64Ref.current;
    const activeB64 = src?.b64 || b64;
    const activeMt  = src?.mt  || mt || "image/jpeg";

    if (!activeB64) {
      setApiErr("Geen foto gevonden. Upload opnieuw en probeer dan te analyseren.");
      return;
    }

    setLoading(true); setApiErr(null);
    try {
      const raw = await callClaude(activeB64, activeMt);
      setResult(enrichResult(raw)); setStep(1);
    } catch(e) { setApiErr(e.message||"Onbekende fout"); }
    finally { setLoading(false); }
  };

  const setAns = (k,v) => setAnswers(p=>({...p,[k]:v}));

  const confirmed = () => result && (result._confirms||[]).every(c=>{
    if(c.type==="dikte") return !!answers.dikte;
    if(c.field) return answers[c.field]!==undefined;
    return true;
  });

  const addOrder = () => {
    setOrders(p=>[...p,{id:Date.now(),r:{...result,ags_cat:answers.dikte||result.ags_cat},ans:{...answers},note}]);
    setStep(0); setFile(null); setPrev(null); setB64(null); setResult(null);
    setAnswers({}); setNote(""); setQualIss([]); setApiErr(null);
    showToast(`✓ Onderdeel ${orders.length+1} toegevoegd`);
  };

  const removeOrder = id => setOrders(p=>p.filter(o=>o.id!==id));

  const resetAll = () => {
    setStep(0); setFile(null); setPrev(null); setB64(null); setResult(null);
    setAnswers({}); setNote(""); setOrders([]); setProject(""); setAlgNote("");
    setQualIss([]); setApiErr(null); b64Ref.current = null;
  };

  const STEPS = ["Schets invoer","Validatie","Orderlijst"];

  return (
    <div>
      {/* TOP BAR */}
      <div style={S.topbar}>
        <span>📞 <a href="tel:0786176833" style={{color:'rgba(255,255,255,0.85)'}}>078-6176833</a></span>
        <span>Ma–Vr 08:00–17:00</span>
      </div>

      {/* HEADER */}
      <div style={S.header}>
        <div>
          <div style={S.logoName}>AGS Products B.V.</div>
          <div style={S.logoSub}>Specialist Lood · Zink · Koper</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {orders.length>0 && (
            <span style={{background:C.red,color:'#fff',borderRadius:4,padding:'4px 10px',fontSize:12,fontWeight:700,cursor:'pointer'}} onClick={()=>setStep(2)}>
              🛒 {orders.length}
            </span>
          )}
          <div style={S.badge}>Maatwerk Tool</div>
        </div>
      </div>

      {/* STEPPER */}
      <div style={S.stepper}>
        {STEPS.map((s,i)=>(
          <div key={i} style={S.stepTab(step===i,step>i)}>
            <div style={S.stepNum(step===i,step>i)}>{step>i?"✓":i+1}</div>
            <span style={S.stepLabel(step===i,step>i)}>{s}</span>
          </div>
        ))}
      </div>

      {/* CONTENT */}
      <div style={S.page}>
        <div style={{...S.section, paddingTop:20}}>

          {/* ── STAP 0 ── */}
          {step===0 && (
            <div>
              {/* Project */}
              <Card title="📁 Project" accent="(optioneel)">
                <div style={S.formGroup}>
                  <label style={S.label}>Projectnaam / referentie</label>
                  <input style={S.input} type="text"
                    placeholder="bijv. Renovatie Kerk Dordrecht"
                    value={project} onChange={e=>setProject(e.target.value)}/>
                </div>
              </Card>

              {/* Input card */}
              <div style={S.card}>
                <div style={{...S.cardBd, paddingBottom:0}}>
                  {/* Tabs */}
                  <div style={S.tabs}>
                    <div style={S.tab(tab==="foto")} onClick={()=>setTab("foto")}>📷 Foto / Scan</div>
                    <div style={S.tab(tab==="handmatig")} onClick={()=>setTab("handmatig")}>✏️ Handmatig</div>
                  </div>
                </div>

                <div style={S.cardBd}>
                  {tab==="foto" && (
                    <div>
                      {!preview ? (
                        <div>
                          <div style={S.uploadZone(drag)}
                            onDragOver={e=>{e.preventDefault();setDrag(true);}}
                            onDragLeave={()=>setDrag(false)}
                            onDrop={handleDrop}
                            onClick={()=>fileRef.current.click()}>
                            <div style={S.uploadIcon}>📐</div>
                            <div style={S.uploadTitle}>Schets uploaden</div>
                            <div style={S.uploadSub}>Sleep hierheen of tik om te kiezen</div>
                            <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',justifyContent:'center'}}>
                              {["JPG","PNG","PDF","HEIC"].map(t=>(
                                <span key={t} style={{fontSize:11,fontWeight:700,padding:'3px 9px',background:C.blue,color:'#fff',borderRadius:2,fontFamily:"'Oswald',sans-serif"}}>{t}</span>
                              ))}
                            </div>
                          </div>
                          <input ref={fileRef} type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={e=>readFile(e.target.files[0])}/>
                          <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>readFile(e.target.files[0])}/>
                          <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:10}}>
                            <Btn variant="blue" onClick={()=>cameraRef.current.click()}>📷 Camera openen</Btn>
                            <Btn variant="ol" onClick={()=>fileRef.current.click()}>🗂 Bestand kiezen</Btn>
                          </div>
                        </div>
                      ) : (
                        <div>
                          {/* Quality issues */}
                          {qualIss.length>0 && (
                            <div style={S.qualWarn}>
                              <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,fontWeight:700,color:C.red,marginBottom:6}}>⚠️ Foto-kwaliteit aandachtspunten</div>
                              {qualIss.map((q,i)=><div key={i} style={{fontSize:13,color:C.warn,marginBottom:2}}>• {q}</div>)}
                              <div style={{fontSize:12,color:C.muted,marginTop:4}}>U kunt toch doorgaan, maar de nauwkeurigheid kan lager zijn.</div>
                            </div>
                          )}
                          {qualIss.length===0 && <Alert type="ok">✓ Foto-kwaliteit is goed</Alert>}

                          {/* Preview */}
                          <div style={{background:'#141828',borderRadius:6,overflow:'hidden',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'center',maxHeight:260}}>
                            <img src={preview} alt="Schets" style={{maxWidth:'100%',maxHeight:260,objectFit:'contain',display:'block'}}/>
                          </div>
                          <div style={{fontSize:13,color:C.muted,marginBottom:12,textAlign:'center'}}>📎 {file?.name} · {(file?.size/1024).toFixed(0)} KB</div>

                          {apiErr && <Alert type="err"><div><strong>⚠️ Analyse mislukt</strong><br/><span style={{fontSize:12}}>{apiErr}</span></div></Alert>}

                          <div style={{display:'flex',flexDirection:'column',gap:10}}>
                            <Btn variant="red" onClick={analyse} disabled={loading}>
                              {loading ? <span>⏳ Analyseren…</span> : "🔍 Analyseer met AGS AI"}
                            </Btn>
                            <Btn variant="ol" sm onClick={()=>{setFile(null);setPrev(null);setB64(null);setQualIss([]);}}>✕ Andere foto kiezen</Btn>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {tab==="handmatig" && <ManualForm onSubmit={r=>{setResult(r);setStep(1);}}/>}
                </div>
              </div>

              {/* Orderlijst preview */}
              {orders.length>0 && (
                <Card title="🛒 Orderlijst" accent={`— ${orders.length} onderdeel${orders.length!==1?"en":""}`}
                  action={<Btn variant="red" sm onClick={()=>setStep(2)}>Naar export →</Btn>}>
                  {orders.map((o,i)=>(
                    <div key={o.id} style={{...S.orderItem, marginBottom: i<orders.length-1?10:0}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                        <div>
                          <span style={S.orderNum}>{i+1}</span>
                          <span style={S.orderType}>{o.r.producttype||"Maatwerk"}</span>
                        </div>
                        <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:4,padding:'4px 10px',color:C.red,cursor:'pointer',fontSize:13,fontWeight:700}} onClick={()=>removeOrder(o.id)}>✕</button>
                      </div>
                      <div style={S.orderMat}>{o.ans?.dikte||o.r.ags_cat}</div>
                      <div style={S.orderMeta}>
                        {o.r.lengte_mm&&<span style={S.orderMetaItem}>L: {o.r.lengte_mm}mm</span>}
                        {o.r.breedte_mm&&<span style={S.orderMetaItem}>B: {o.r.breedte_mm}mm</span>}
                        <span style={{...S.orderMetaItem,color:C.red,fontWeight:700}}>Aantal: {o.r.aantal}</span>
                      </div>
                    </div>
                  ))}
                </Card>
              )}
            </div>
          )}

          {/* ── STAP 1: VALIDATIE ── */}
          {step===1 && result && (
            <div>
              {/* Terug knop */}
              <div style={{marginBottom:14}}>
                <Btn variant="ol" sm style={{width:'auto'}} onClick={()=>setStep(0)}>← Terug</Btn>
              </div>

              {/* Chips */}
              <div style={S.chipsGrid}>
                {[[result.aantal??"—","Stuks"],[result.lengte_mm??"—","Lengte mm"],[result.breedte_mm??"—","Breedte mm"],[(result.bewerkingen||[]).length,"Bewerkingen"]].map(([v,l])=>(
                  <div key={l} style={S.chip}>
                    <span style={S.chipVal}>{v}</span>
                    <span style={S.chipLbl}>{l}</span>
                  </div>
                ))}
              </div>

              {/* Resultaat */}
              <Card title="📊 Analyse Resultaat" accent="— AGS Gekwalificeerd">
                <ResultCard result={result}/>
              </Card>

              {/* Bevestigingen */}
              {result._confirms?.length>0 && (
                <div>
                  <div style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:C.red,borderLeft:`4px solid ${C.red}`,paddingLeft:10,marginBottom:12}}>
                    ❓ Bevestiging vereist ({result._confirms.length})
                  </div>
                  <ConfirmSection confirms={result._confirms} answers={answers} onAnswer={setAns}/>
                </div>
              )}

              {confirmed() && <Alert type="ok">✓ <strong>Alle bevestigingen compleet.</strong></Alert>}

              {/* Opmerking */}
              <Card title="💬 Opmerking" accent="(optioneel)">
                <textarea style={S.textarea} rows={3}
                  placeholder="Speciale afwerking, leveringsinstructie, kleurcodering..."
                  value={note} onChange={e=>setNote(e.target.value)}/>
              </Card>

              {/* Actie knoppen */}
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <Btn variant="green" disabled={!confirmed()} onClick={addOrder}>
                  + Toevoegen aan orderlijst {orders.length>0?`(nu ${orders.length+1})` :""}
                </Btn>
                {orders.length>0 && (
                  <Btn variant="blue" onClick={()=>setStep(2)}>📋 Naar orderlijst & export →</Btn>
                )}
              </div>
              {!confirmed() && <div style={{fontSize:13,color:C.muted,textAlign:'center',marginTop:8}}>Beantwoord eerst alle bevestigingsvragen hierboven.</div>}
            </div>
          )}

          {/* ── STAP 2: ORDERLIJST & EXPORT ── */}
          {step===2 && (
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,gap:12}}>
                <div>
                  <div style={{fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:700,color:C.blue}}>Orderlijst & Export</div>
                  <div style={{fontSize:13,color:C.muted}}>Klaar voor offerte</div>
                </div>
                <Btn variant="ol" sm style={{width:'auto'}} onClick={()=>setStep(0)}>+ Toevoegen</Btn>
              </div>

              {project && <Alert type="info">📁 <strong>Project:</strong> {project}</Alert>}

              {orders.length===0 ? (
                <Alert type="warn">⚠️ Orderlijst is leeg. Voeg eerst een onderdeel toe.</Alert>
              ) : (
                <div>
                  {/* Order items */}
                  {orders.map((o,i)=>(
                    <div key={o.id} style={{...S.orderItem,marginBottom:12}}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                        <div>
                          <span style={S.orderNum}>{i+1}</span>
                          <span style={S.orderType}>{o.r.producttype||"Maatwerk"}</span>
                        </div>
                        <button style={{background:'none',border:`1px solid ${C.border}`,borderRadius:4,padding:'4px 10px',color:C.red,cursor:'pointer',fontSize:13,fontWeight:700}} onClick={()=>removeOrder(o.id)}>✕</button>
                      </div>
                      <div style={{...S.orderMat,marginBottom:6}}>{o.ans?.dikte||o.r.ags_cat}</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                        {[["Lengte",o.r.lengte_mm,o.r.lengte_mm?o.r.lengte_mm+"mm":null],["Breedte",o.r.breedte_mm,o.r.breedte_mm?o.r.breedte_mm+"mm":null],["Diepte",o.r.diepte_mm,o.r.diepte_mm?o.r.diepte_mm+"mm":null],["Aantal",o.r.aantal,o.r.aantal+" stuks"]].filter(([,val])=>val!=null).map(([l,,display])=>(
                          <div key={l} style={{fontSize:13}}>
                            <span style={{color:C.muted}}>{l}: </span>
                            <span style={{fontWeight:700,color:C.body}}>{display}</span>
                          </div>
                        ))}
                      </div>
                      {o.r.bewerkingen?.length>0 && <div style={{fontSize:12,color:C.muted,marginTop:6}}>{o.r.bewerkingen.join(", ")}</div>}
                      {o.note && <div style={{fontSize:13,fontStyle:'italic',color:C.muted,marginTop:4,borderTop:`1px solid ${C.border2}`,paddingTop:6}}>💬 {o.note}</div>}
                    </div>
                  ))}

                  {/* Algemene opmerking */}
                  <Card title="💬 Algemene opmerking" accent="(optioneel)">
                    <textarea style={S.textarea} rows={3}
                      placeholder="Gewenste leverdatum, algemene instructies..."
                      value={algNote} onChange={e=>setAlgNote(e.target.value)}/>
                  </Card>

                  {/* Export knoppen */}
                  <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
                    <Btn variant="red" onClick={()=>{exportPDF(orders,project,algNote);showToast("📄 PDF geopend in nieuw venster");}}>📄 PDF Offerte downloaden</Btn>
                    <Btn variant="blue" onClick={()=>{exportCSV(orders,project);showToast("📊 CSV geëxporteerd voor ERP");}}>📊 CSV voor ERP exporteren</Btn>
                    <Btn variant="ol" onClick={resetAll}>🔄 Nieuwe order starten</Btn>
                  </div>

                  {/* Contact */}
                  <Card title="📞 Vragen over uw offerte?">
                    <div style={{display:'flex',flexDirection:'column',gap:14}}>
                      {[["📞","Telefoon","078-6176833","Ma–Vr 08:00–17:00"],["✉️","E-mail","info@ags.nl","Reactie binnen 1 werkdag"],["📍","Adres","Daltonstraat 54, Dordrecht","Overdekte laadkade"]].map(([ico,l,v,s])=>(
                        <div key={l} style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                          <span style={{fontSize:24,width:32,textAlign:'center'}}>{ico}</span>
                          <div>
                            <div style={{fontSize:11,textTransform:'uppercase',color:C.muted,fontWeight:700,letterSpacing:'0.5px'}}>{l}</div>
                            <div style={{fontWeight:700,color:C.blue,fontSize:15}}>{v}</div>
                            <div style={{fontSize:13,color:C.muted}}>{s}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>
              )}
            </div>
          )}

        </div>{/* /section */}
      </div>{/* /page */}

      {/* CTA BANNER */}
      <div style={{background:C.blue,padding:'24px 16px',textAlign:'center'}}>
        <div style={{maxWidth:480,margin:'0 auto'}}>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',color:'rgba(255,255,255,0.6)',marginBottom:6}}>
            AGS Products B.V.
          </div>
          <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:'#fff',lineHeight:1.25,marginBottom:6}}>
            Het complete assortiment<br/>voor uw dakproject
          </div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.7)',marginBottom:18,lineHeight:1.5}}>
            Van loden afvoeren tot zinken vergaarbakken — ontdek alles wat AGS te bieden heeft.
          </div>
          <a href="https://www.ags.nl" target="_blank" rel="noopener noreferrer"
            style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,
              background:C.red,color:'#fff',borderRadius:6,padding:'14px 28px',
              fontFamily:"'Open Sans',sans-serif",fontSize:15,fontWeight:700,
              textDecoration:'none',textTransform:'uppercase',letterSpacing:'0.3px',
              boxShadow:'0 4px 16px rgba(204,16,32,0.4)',width:'100%',maxWidth:340,
              transition:'all 0.18s'}}>
            Bekijk het volledige assortiment →
          </a>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.45)',marginTop:10}}>www.ags.nl</div>
        </div>
      </div>

      {/* FOOTER */}
      <div style={S.redBar}/>
      <div style={S.footer}>
        <div style={{marginBottom:4,fontWeight:700,color:'rgba(255,255,255,0.95)'}}>AGS Products B.V.</div>
        <div>Daltonstraat 54, 3316GD Dordrecht</div>
        <div style={{marginTop:8,display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:4}}>
          <span>© {new Date().getFullYear()} AGS Products B.V.</span>
          <span>www.ags.nl</span>
        </div>
      </div>

      {/* TOAST */}
      {toast && <div style={S.toast}>🔔 {toast}</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AGSTool />);
</script>
</body>
</html>
